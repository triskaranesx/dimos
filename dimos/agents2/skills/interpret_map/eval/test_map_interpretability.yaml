point_placement_tests:
# large office floor plan with noise to irl occupancy grid
  - map_id: "office_noise"
    image_path: "floorplan_office_noise.png"
    resolution: 0.05
    robot_pose:
      position: [470, 920, 0] # pixels
      orientation: [0.0, 0.0,  0.7071068, 0.7071068]
    questions:
      - query: "which would be the furthest room from the robot's current position?"
        expected_range:
          x: [1300, 1509]
          y: [477, 859]
      - query: "which would be the second room to the robot's left along the corridor?"
        expected_range:
          x: [30, 373]
          y: [665, 854]
      - query: "go to the conference table in the office"
        expected_range:
          x: [42, 547]
          y: [15, 270]
      - query: "a room to accomodate more than 10 people"
        expected_range:
          x: [34, 615]
          y: [12, 352]
      - query: "smallest room"
        expected_range:
          x: [1290, 1510]
          y: [478, 861]
      - query: "a point immediately in front of the robot"
        expected_range:
          x: [398, 553]
          y: [817, 905]
      - query: "a point immediately behind the robot"
        expected_range:
          x: [400, 552]
          y: [908, 1009]
      - query: "a point immediately to the left of the robot"
        expected_range:
          x: [277, 451]
          y: [805, 1009]
      - query: "a point immediately to the right of the robot"
        expected_range:
          x: [450, 634]
          y: [804, 1013]
      - query: "a point on the robot"
        expected_range:
          x: [436, 516]
          y: [837, 909]

