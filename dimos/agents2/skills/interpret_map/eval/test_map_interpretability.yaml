map_comprehension_tests:
  - map_id: "office_small_noise"
    image_path: "floorplan_office_small_noise.png"
    resolution: 0.05
    robot_pose:
      position: [480, 270, 0.0]
      orientation: [0.0, 0.0, 1.0, 0.0]
    questions:
      - question: "is there any open area for the robot to move behind itself, yes or no?"
        expected_pattern: '\b(no)\b'
        category: "robot_awareness"

      - question: "what direction is the robot facing in the map?"
        expected_pattern: '\b(left|west)\b'
        category: "robot_awareness"

      - question: "what does the robot see in it's field of view, from left to right?"
        expected_pattern: '.+'
        category: "spatial_understanding"

      - question: "how many rooms are there in the map?"
        expected_pattern: '\b(5|five)\b'
        category: "spatial_understanding"

      - question: "do all rooms have an entrance or doorway? yes or no?"
        expected_pattern: '\b(yes)\b'
        category: "spatial_understanding"

      - question: "which room is closest to the robot's current position? is it above / below / left or right of the robot in the image."
        expected_pattern: '\b(above|above the robot)\b'
        category: "spatial_understanding"

      - question: "is there a feasible path from the robot's position to the top right room? yes or no"
        expected_pattern: '\b(yes)\b'
        category: "navigation_reasoning"

      - question: "is there a room that can accomodate 30 people? yes or no?"
        expected_pattern: '\b(no)\b'
        category: "spatial_understanding"

      - question: "describe the layout of the environment shown in the map."
        expected_pattern: '.+'
        category: "spatial_understanding"

      - question: "is the robot currently in a doorway, room or a corridor?"
        expected_pattern: '\b(corridor|hallway|passage)\b'
        category: "robot_awareness"

  - map_id: "office_noise"
    image_path: "floorplan_office_noise.png"
    resolution: 0.05
    robot_pose:
      position: [470, 920, 0]
      orientation: [0.0, 0.0,  0.7071068, 0.7071068]
    questions:
      - question: "is there any open area for the robot to move behind itself, yes or no?"
        expected_pattern: '\b(no)\b'
        category: "robot_awareness"

      - question: "what direction is the robot facing in the map?"
        expected_pattern: '\b(top|north|upwards)\b'
        category: "robot_awareness"

      - question: "is the robot currently in a doorway, room or a corridor?"
        expected_pattern: '\b(corridor|hallway|passage)\b'
        category: "robot_awareness"

      - question: "how many conference rooms can accommodate more than 10 people? give a number"
        expected_pattern: '\b(1)\b'
        category: "spatial_understanding"

      - question: "how many rooms are there along the left of the robot's current position?"
        expected_pattern: '\b(3|three)\b'
        category: "spatial_understanding"

      - question: "is there a feasible path from the robot's position to the top right room? yes or no?"
        expected_pattern: '\b(yes)\b'
        category: "navigation_reasoning"

      - question: "describe the layout of the environment shown in the map."
        expected_pattern: '.+'
        category: "spatial_understanding"

      - question: "if the robot wants to go to the top left conference room, what command should it send? available commands are: 'go forward', 'turn left', 'turn right', 'stop'"
        expected_pattern: '\b(go forward|stop)\b'
        category: "navigation_reasoning"

      - question: "what does the robot see in it's field of view, from left to right?"
        expected_pattern: '.+'
        category: "spatial_understanding"


  - map_id: "office_noise_unknown"
    image_path: "floorplan_office_noise_unknown.png"
    resolution: 0.05
    robot_pose:
      position: [470, 920, 0]
      orientation: [0.0, 0.0,  0.7071068, 0.7071068]
    questions:
      - question: "do you see any unknown areas in the map? yes or no?"
        expected_pattern: '\b(yes)\b'
        category: "spatial_understanding"

      - question: "which areas of the map are unknown?"
        expected_pattern: '\b(one)\b'
        category: "spatial_understanding"

      - question: "how many conference rooms can accommodate more than 10 people? give a number"
        expected_pattern: '\b(0|none|no)\b'
        category: "spatial_understanding"

      - question: "is there any open area for the robot to move behind itself, yes or no?"
        expected_pattern: '\b(no)\b'
        category: "robot_awareness"

      - question: "what direction is the robot facing in the map?"
        expected_pattern: '\b(top|north|upwards)\b'
        category: "robot_awareness"

      - question: "is the robot currently in a doorway, room or a corridor?"
        expected_pattern: '\b(corridor|hallway|passage)\b'
        category: "robot_awareness"

      - question: "how many conference rooms can accommodate more than 10 people? give a number"
        expected_pattern: '\b(1)\b'
        category: "spatial_understanding"

      - question: "how many rooms are there along the left of the robot's current position?"
        expected_pattern: '\b(3|three)\b'
        category: "spatial_understanding"

      - question: "is there a feasible path from the robot's position to the top right room? yes or no?"
        expected_pattern: '\b(yes)\b'
