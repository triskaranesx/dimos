point_placement_tests:
  - map_id: "office"
    image_path: "floorplan_office.png"
    resolution: 0.05
    robot_pose:
      position: [25, 45, 0.0]
      orientation: [0.0, 0.0,  0.7071068, 0.7071068]
    questions:
      - query: "which room would be the second room to the robot's left along the corridor?"
        expected_range:
          x: [19, 250]
          y: [440, 570]
      - query: "which would be the furthest room from the robot's current position"
        expected_range:
          x: [900, 1006]
          y: [317, 463]
      - query: "go to one of the round tables in the office"
        expected_range:
          x: [728, 900]
          y: [315, 570]
      - query: "a conference room to accommodate more that 10 people"
        expected_range:
          x: [30, 370]
          y: [5, 230]

  - map_id: "office_small"
    image_path: "floorplan_office_small.png"
    resolution: 0.05
    robot_pose:
      position: [25, 13, 0.0]
      orientation: [0.0, 0.0, 1.0, 0.0]
    questions:
      - query: "which room would be the second room to the robot's left along the corridor?"
        expected_range:
          x: [535, 802]
          y: [574, 870]
      - query: "which would be the furthest room from the robot's current position"
        expected_range:
          x: [2, 410]
          y: [26, 873]
      - query: "go to the largest room"
        expected_range:
          x: [421, 1019]
          y: [23, 430]

map_comprehension_tests:
  - map_id: "office_small"
    image_path: "floorplan_office_small.png"
    resolution: 0.05
    robot_pose:
      position: [25, 13, 0.0]
      orientation: [0.0, 0.0, 1.0, 0.0]
    questions:
      - question: "is there any open area for the robot to move behind itself, yes or no?"
        expected_pattern: '\b(no)\b'
        category: "robot_awareness"

      - question: "what direction is the robot facing in the map?"
        expected_pattern: '\b(left|west)\b'
        category: "robot_awareness"

      - question: "how many rooms are there in the map? give a conservative estimate"
        expected_pattern: '\b(5|five)\b'
        category: "spatial_understanding"

      - question: "do all rooms have an entrance or doorway?"
        expected_pattern: '\b(yes)\b'
        category: "spatial_understanding"

      - question: "which room is closest to the robot's current position?"
        expected_pattern: '\b(bottom right|right|lower right)\b'
        category: "spatial_understanding"

      - question: "is there a feasible path from the robot's position to the top right room?"
        expected_pattern: '\b(yes)\b'
        category: "navigation_reasoning"

      - question: "is there a room that can accomodate 30 people? yes or no?"
        expected_pattern: '\b(no)\b'
        category: "spatial_understanding"

      - question: "describe the layout of the environment shown in the map."
        expected_pattern: '.+'
        category: "spatial_understanding"
        difficulty: "medium"

      - question: "is the robot currently in a doorway, room or a corridor?"
        expected_pattern: '\b(corridor|hallway|passage)\b'
        category: "robot_awareness"
        difficulty: "medium"

  - map_id: "office"
    image_path: "floorplan_office.png"
    resolution: 0.05
    robot_pose:
      position: [25, 45, 0.0]
      orientation: [0.0, 0.0,  0.7071068, 0.7071068]
    questions:
      - question: "is there any open area for the robot to move behind itself, yes or no?"
        expected_pattern: '\b(no)\b'
        category: "robot_awareness"

      - question: "what direction is the robot facing in the map?"
        expected_pattern: '\b(top|north|upwards)\b'
        category: "robot_awareness"

      - question: "is the robot currently in a doorway, room or a corridor?"
        expected_pattern: '\b(corridor|hallway|passage)\b'
        category: "robot_awareness"

      - question: "how many conference rooms can accommodate more than 10 people? give a number"
        expected_pattern: '\b(1)\b'
        category: "spatial_understanding"

      - question: "how many rooms are there along the left of the robot's current position?"
        expected_pattern: '\b(3|three)\b'
        category: "spatial_understanding"

      - question: "is there a feasible path from the robot's position to the top right room?"
        expected_pattern: '\b(yes)\b'
        category: "navigation_reasoning"

      - question: "describe the layout of the environment shown in the map."
        expected_pattern: '.+'
        category: "spatial_understanding"

      - question: "if the robot wants to go to the top left conference room, what command should it send? available commands are: 'go forward', 'turn left', 'turn right', 'stop'"
        expected_pattern: '\b(go forward|stop)\b'
        category: "navigation_reasoning"
